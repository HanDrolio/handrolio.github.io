<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>COSM.OS</title>
<meta name="description" content="A journal that answers in a voice. Offline, private, no accounts.">
<meta name="theme-color" content="#06080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%2306080f'/><circle cx='22' cy='32' r='9' fill='%234a8dff'/><circle cx='42' cy='32' r='9' fill='%23f0c060'/></svg>">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <div class="brand"><span class="m">🟦🌌🟨</span><span class="txt">COSM.OS</span></div>
  <div class="tabs">
    <button class="tab on" data-mode="chat">chat</button>
    <button class="tab" data-mode="log">log</button>
  </div>
  <div class="utils">
    <button class="util" id="export">export</button>
    <button class="util" id="importBtn">import</button>
    <input type="file" id="importFile" accept="application/json">
  </div>
</header>

<nav id="rail" aria-label="voices"></nav>
<div id="lockNote"></div>

<main id="scroll">
  <div id="col"></div>
</main>

<div class="barwrap">
  <div class="bar" id="bar">
    <textarea id="input" rows="1" placeholder="say it plain…" aria-label="message"></textarea>
    <button id="send" aria-label="send">↑</button>
  </div>
</div>

<script src="./js/personas.js"></script>
<script src="./js/engine.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
